<!-- PROTOTYPE — throwaway. EDITOR layout ("A2"): single-screen selection window,
     all tables visible with dropdown affordances. The share CARD is a separate,
     still-open design (user consciously splits editor UX from card presentation).
     "T" or the Σ tab toggles the trait-tally drawer (visible during sigil selection).
     Master-trait data = REAL Io rows from Maygi's MasterTraits CSV. -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GBFR Sharecard — EDITOR prototype A2</title>
<style>
  :root{
    --bg:#0d1020; --panel:#171b30; --panel2:#1e2340; --line:#2c3357;
    --ink:#e8ebff; --dim:#8b93bd; --accent:#e8b34b;
    --insight:#b06cf0; --essence:#4bb3e8; --crux:#e85f6a; --sel:#2c8f5e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#05060c;color:var(--ink);font-family:"Segoe UI",system-ui,sans-serif}
  #stage{position:relative;width:1920px;height:1080px;transform-origin:top left;margin:0 auto}
  .card{position:absolute;inset:0;display:flex;background:
    radial-gradient(1200px 700px at 70% -10%,#232a52 0%,var(--bg) 55%)}
  .icon{display:inline-block;width:17px;height:17px;border-radius:4px;flex:none;
    background:linear-gradient(135deg,#3a4370,#232a52);border:1px solid var(--line)}
  .icon.sm{width:14px;height:14px}
  h3{font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);
     border-bottom:1px solid var(--line);padding-bottom:4px;margin-bottom:8px}
  .lvl{color:var(--accent);font-variant-numeric:tabular-nums;font-weight:600}
  .dim{color:var(--dim)}

  /* ---- columns ---- */
  .c1{width:330px;background:rgba(0,0,0,.28);padding:16px;display:flex;flex-direction:column;
      gap:13px;border-right:1px solid var(--line)}
  .c2{width:480px;padding:16px;border-right:1px solid var(--line);display:flex;
      flex-direction:column;gap:13px}
  .c3{flex:1;padding:16px;display:flex;flex-direction:column;gap:10px}
  .mtGrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .skillGrid{display:flex;flex-direction:column;gap:6px}
  .skill{display:flex;align-items:center;gap:9px;background:var(--panel);border-radius:5px;
    padding:7px 12px;font-size:14px}
  .skill .orb{width:18px;height:18px;border-radius:50%;flex:none;
    background:radial-gradient(circle at 35% 30%,#ffd98a,#c2571b);border:1px solid #0006}
  .skill .diamond{margin-left:auto;width:24px;height:24px;flex:none;transform:rotate(45deg);
    background:linear-gradient(135deg,#8a2f35,#3d1114);border:1.5px solid #c46a4a;
    border-radius:4px;margin-right:5px}
  .summonGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:760px}
  .summonCard{background:var(--panel);border-radius:6px;padding:8px 11px;display:flex;
    flex-direction:column;gap:5px;font-size:13.5px}
  .summonCard .row{display:flex;align-items:center;gap:7px}
  .summonCard .row .grow{flex:1}
  .summonCard .row .lvl{margin-left:auto}
  .status{display:grid;grid-template-columns:1fr 1fr;gap:6px 10px}
  .status .stat{background:rgba(0,0,0,.22);border-radius:5px;padding:4px 9px;
    display:flex;align-items:baseline;gap:7px}
  .status .stat .lbl{font-size:11.5px;color:var(--dim)}
  .status .stat .lvl{font-size:18.5px;margin-left:auto}
  .charLvl{position:absolute;top:8px;left:8px;z-index:2;background:rgba(5,6,12,.75);
    border:1px solid var(--line);border-radius:6px;padding:3px 10px;font-size:13px}
  .charLvl b{font-size:17px;color:var(--accent)}

  /* ---- col 1: identity / over mastery / summons ---- */
  .portraitWrap{position:relative;height:320px}
  .portrait{position:absolute;inset:0;background:center/cover;
    background-image:url("https://cdn.gbf.wiki/relink/Cmn_imgchr_0400_2.png");
    background-position:38% 20%;background-size:190%;
    -webkit-mask-image:linear-gradient(#000 55%,transparent 97%),
      linear-gradient(90deg,transparent 0%,#000 14%,#000 86%,transparent 100%);
    -webkit-mask-composite:source-in;
    mask-image:linear-gradient(#000 55%,transparent 97%),
      linear-gradient(90deg,transparent 0%,#000 14%,#000 86%,transparent 100%);
    mask-composite:intersect}
  .nameBadge{position:absolute;left:0;right:0;bottom:6px;padding:6px 16px;
    background:linear-gradient(90deg,transparent,rgba(5,6,12,.9) 25%,rgba(5,6,12,.9) 75%,transparent);
    font-size:26px;font-weight:700;display:flex;align-items:center;gap:10px;
    justify-content:center}
  .nameBadge .elem{width:20px;height:20px;border-radius:50%;flex:none;align-self:center;
    background:radial-gradient(circle at 35% 30%,#ffd98a,#c2571b);border:1px solid #0006}
  .kv{display:grid;grid-template-columns:1fr auto;gap:3px 8px;font-size:14px}
  .kv>span{padding:2.5px 0;border-bottom:1px solid rgba(44,51,87,.5)}
  .summon{display:grid;grid-template-columns:17px 1fr auto;gap:7px;align-items:center;
    font-size:13.5px;padding:3.5px 0;border-bottom:1px solid rgba(44,51,87,.5)}
  .summon .eb{grid-column:2/4;font-size:12px;color:var(--dim);padding-bottom:3px}

  /* ---- col 2: weapon + sigils ---- */
  .weapon{background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:8px;padding:11px 13px}
  .wpnHead{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
  .wpnName{font-size:18px;font-weight:700}
  .wpnBase{display:flex;gap:16px;font-size:14px;margin:5px 0 7px;align-items:baseline}
  .wpnBase .lvl{font-size:18px}
  .trow{display:grid;grid-template-columns:17px 1fr auto;gap:7px;align-items:center;
    font-size:13.5px;padding:3px 0;border-bottom:1px solid rgba(44,51,87,.45)}
  .trow .rot{color:var(--essence);font-size:13px;margin-left:4px}
  .imbue h4{font-size:11.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.07em;
    margin:8px 0 3px;display:flex;justify-content:space-between}
  .sigilGrid{display:flex;flex-direction:column;gap:5px}
  .sigil{display:grid;grid-template-columns:1fr 1fr 34px;gap:8px;align-items:center;
    background:var(--panel);border-radius:5px;padding:5px 8px;font-size:14px}
  .sigil .cell{display:flex;align-items:center;gap:7px;min-width:0}
  .sigil .cell span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sigil .sec{color:var(--dim)}
  .sigil .lvl{text-align:right}

  /* ---- col 3: master traits, one card per style ---- */
  .styleCol{background:rgba(0,0,0,.22);border-radius:8px;padding:10px 11px;display:flex;
    flex-direction:column;gap:6px;border-top:3px solid var(--sc)}
  .styleCol h4{font-size:16px;color:var(--sc)}
  .rank{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;
    margin-top:3px;display:flex;justify-content:space-between}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:4px}
  .opt{font-size:12.5px;line-height:1.15;padding:4px 6px;border-radius:4px;background:var(--panel);
    color:var(--dim);border:1px solid transparent;height:30px;overflow:hidden;
    display:flex;align-items:center;gap:5px}
  .opt.long{font-size:11px;line-height:1.06;padding:2px 4px;gap:4px}
  .opt.long .icon.sm{width:12px;height:12px}
  .opt.on{background:rgba(44,143,94,.25);color:var(--ink);border-color:var(--sel)}
  .mtFoot{grid-column:1/-1;font-size:12px;color:var(--dim);text-align:right}
  .brand{position:absolute;bottom:6px;left:14px;font-size:11px;color:var(--dim)}

  /* ---- editor affordances (always on — this IS the editor) ---- */
  .sel{position:relative;border:1px solid var(--line);border-radius:4px;
    background:var(--panel2);padding-right:16px !important}
  .sel::after{content:"▾";position:absolute;right:4px;top:50%;transform:translateY(-50%);
    font-size:9px;color:var(--dim)}
  .opt{cursor:pointer}
  .opt{border-color:var(--line)}
  .opt.on{border-color:var(--sel)}
  .lvl.sel{padding:1px 16px 1px 5px}

  /* ---- trait tally drawer ---- */
  #tallyTab{position:absolute;right:0;top:340px;z-index:5;writing-mode:vertical-rl;
    background:var(--accent);color:#1a1405;font-weight:700;font-size:13px;
    padding:10px 6px;border-radius:6px 0 0 6px;cursor:pointer;letter-spacing:.06em}
  #tally{position:absolute;right:0;top:0;height:100%;width:300px;z-index:4;
    background:#10132a;border-left:2px solid var(--accent);padding:16px;
    transform:translateX(100%);transition:transform .18s ease;overflow-y:auto}
  #tally.open{transform:none}
  #tally.open + #tallyTab{right:300px}
  .tallyRow{display:flex;align-items:center;gap:8px;font-size:13.5px;
    padding:3.5px 0;border-bottom:1px solid rgba(44,51,87,.5)}
  .tallyRow .lvl{margin-left:auto}
  .tallyRow .max{color:var(--dim);font-size:11.5px;width:34px;text-align:right}
</style>
</head>
<body>
<div id="stage"></div>

<script>
/* ------- sample Build (Io) — master traits are REAL rows from Maygi's CSV ------- */
const D = {
  name:"Io", level:100,
  status:[
    { t:"HP", v:"124210" }, { t:"ATK", v:"73460" },
    { t:"Crit. Hit Rate", v:"95%" }, { t:"Stun Power", v:"326" },
  ],
  skills:["Stargaze","Concentration","Mystic Vortex","Flowery Seven"],
  overMastery:[
    { t:"Critical Hit Rate Up", v:"+20%" },
    { t:"Normal Attack DMG Cap Up", v:"+16%" },
    { t:"Skill DMG Cap Up", v:"+16%" },
    { t:"Attack Power Up", v:"+800" },
  ],
  summons:[
    { n:"Bahamut", t:"War Elemental", l:15, ebT:"ATK", ebV:"+2410" },
    { n:"Kaguya", t:"Berserker Echo", l:15, ebT:"HP", ebV:"+4800" },
    { n:"Alexiel", t:"Spartan Echo", l:15, ebT:"Skill DMG Cap", ebV:"+80%" },
    { n:"Belial", t:"Supplementary DMG", l:15, ebT:"Crit Rate", ebV:"+24%" },
  ],
  weapon:{
    name:"Caduceus +99", series:"Terminus", level:150, hp:1159, atk:20583, crit:0, stun:0,
    traits:[
      { t:"Catastrophe Nova", l:35, rot:false },
      { t:"Tyranny",          l:25, rot:true  },   /* ⇄ rotatable 2nd slot */
      { t:"DMG Cap",          l:15, rot:false },
      { t:"Sigil Booster",    l:1,  rot:false },
      { t:"Unbound Master",   l:55, rot:false },
    ],
    wrightstone:{ name:"Sage's Wrightstone",
      rows:[ {t:"HP",l:20},{t:"Nimble Onslaught",l:15},{t:"Autorevive",l:10} ] },
  },
  sigils:[
    { p:"Stun Power", s:"Damage Cap", l:15 },
    { p:"Stun Power", s:"Damage Cap", l:15 },
    { p:"Stun Power", s:"Damage Cap", l:15 },
    { p:"HP", s:"Celestial Aqua", l:15 },
    { p:"HP", s:"Celestial Ventus", l:15 },
    { p:"Quick Cooldown", s:"Celestial Lumen", l:15 },
    { p:"Quick Cooldown", s:"Fatebreaker", l:15 },
    { p:"Quick Cooldown", s:"Supplementary DMG", l:15 },
    { p:"Cascade", s:"Supplementary DMG", l:15 },
    { p:"Improved Dodge", s:"Steady Focus", l:15 },
    { p:"Character Sigil", s:"Quick Charge", l:15 },
    { p:"Warpath", s:"Quick Charge", l:15 },
  ],
  perks:"Insight Perk 2 · Essence Perk 3 · Crux Perk 1",
};

/* Io master traits, verbatim from the MasterTraits CSV (ids 1–30 per style). */
const MT = {
  Insight:{ v:"--insight", ranks:{
    "Style Rank 1":["SG Charge -5%","SG Cap 35%","DMG Cap +20%","Max HP +15k"],
    "Style Rank 2":["(*) Stargaze BATK +5%","(**) Stargaze V DMG +10%","(**) Concen. Dura. +10%","Concen. CD -5%","Mystic Vortex CD -5%","DMG Cap +25%","ATK +30%","Cap 100% with Poison"],
    "Style Rank 3":["(*) Stargaze BATK +10%","(**) Stargaze V DMG +15%","(**) Concentration Cut 20%","SG Cap 35%","Concentration CD -5%","Cap +20% * Basic","Guard Break +7%","Max HP +15k"],
    "Style Rank EX":["(**) Stargaze V DMG +25%","Vortex DEF Up 10%","Gravity Cap 45%","Dodge Shield 1000","Cap +20% * Basic","Crit Rate +25%","Crit DMG +9%","DMG Cap +30%","Summon Cost -1","DMG Cap +30%"],
  }, sel:{ "Style Rank 1":[1,2],"Style Rank 2":[5,6],"Style Rank 3":[3],"Style Rank EX":[7] } },
  Essence:{ v:"--essence", ranks:{
    "Style Rank 1":["Skill CD -2%","SG Cap 35%","DMG Cap +20%","DEF +5%"],
    "Style Rank 2":["Skill CD -3%","Skills ATK +10% (*)","Lightning CD -5%","Freeze ATK +10%","Fire ATK +10%","Skill DMG Cap 35%","Max HP +15k","Burn DMG Cap 100"],
    "Style Rank 3":["(**) Magic Chain Dur +20%","(**) Magic Chain Dmg x1.5","(***) Fire+Lightning AoE Dura. 10%","DMG Cap +30%","Gravity Well ATK 10%","ATK+10%*Attack","Chain Burst Cap 40%","ATK +30%"],
    "Style Rank EX":["Freeze+Lightning +10% (***)","Lightning Paralyze+2s","Freeze DMG Cap 45%","Fire DMG Cap 45%","DMG Cap +30%","ATK+20% Cap+50% Restriction 50%","ATK+10% * Attack","DMG Cap +30%","Summon Cost +1","DMG Cap +30%"],
  }, sel:{ "Style Rank 1":[0,2],"Style Rank 2":[0,1,5],"Style Rank 3":[0,1,3,6],"Style Rank EX":[1,2,4,5,7] } },
  Crux:{ v:"--crux", ranks:{
    "Style Rank 1":["SG Charge -5%","SG ATK +10%","DMG Cap +20%","Max HP +15k"],
    "Style Rank 2":["F7 CD -1%","F7 ATK 10%","Charging F7 DEF +5%","F7 Cap 45%","Heal Winds→Shield 3k","Normal A. Cap 35%","Crit Rate +15%","Cap 100% with Blight"],
    "Style Rank 3":["F7 Charge -5%","(**) F7 ATK+10% Cap+50%","Charge Unique -5%","Skill DMG Cap 35%","F7 Stack ATK -5%","HP+10k*Def-Supp","Crit DMG +9%","Crit Rate +25%"],
    "Style Rank EX":["(***) F7 DMG Enhanced","Heal Winds→Shield 3k","F7 Cap 45%","Crit Gauge -10%","DEF+6%/Def-Supp sigil","Stun Power +4","WE DMG dealt +10%","DMG Cap +30%","Primal Burst +25%","DMG Cap +30%"],
  }, sel:{ "Style Rank 1":[2],"Style Rank 2":[5],"Style Rank 3":[7],"Style Rank EX":[7,9] } },
};
const PTS = { "Style Rank 1":10,"Style Rank 2":10,"Style Rank 3":10,"Style Rank EX":20 };
const ic = c => `<span class="icon ${c||''}"></span>`;

function render(){
  const card = `<div class="card" id="card">
    <div class="c1">
      <div class="portraitWrap"><div class="portrait"></div>
        <div class="charLvl">Lvl <b>${D.level}</b></div>
        <div class="nameBadge"><span class="elem"></span>${D.name}</div>
      </div>
      <div><h3>Status</h3><div class="status">
        ${D.status.map(s=>`<div class="stat"><span class="lbl">${s.t}</span>
          <span class="lvl">${s.v}</span></div>`).join("")}
      </div></div>
      <div><h3>Over Mastery</h3><div class="kv">
        ${D.overMastery.map(m=>`<span class="sel">${m.t}</span><span class="lvl sel">${m.v}</span>`).join("")}
      </div></div>
      <div><h3>Skills</h3><div class="skillGrid">
        ${D.skills.map(s=>`<div class="skill sel"><span class="orb"></span><span>${s}</span>
          <span class="diamond"></span></div>`).join("")}
      </div></div>
    </div>
    <div class="c2">
      <h3>Weapon</h3>
      <div class="weapon">
        <div class="wpnHead"><span class="wpnName sel">${D.weapon.name}</span>
          <span class="dim">${D.weapon.series} · Lv. ${D.weapon.level}</span></div>
        <div class="wpnBase">
          <span>HP <span class="lvl">${D.weapon.hp}</span></span>
          <span>ATK <span class="lvl">${D.weapon.atk}</span></span>
          <span>Crit <span class="lvl">${D.weapon.crit}%</span></span>
          <span>Stun <span class="lvl">${D.weapon.stun}</span></span></div>
        ${D.weapon.traits.map(t=>`<div class="trow">${ic('sm')}
          <span class="${t.rot?'sel':''}">${t.t}${t.rot?'<span class="rot"> ⇄</span>':''}</span>
          <span class="lvl">T.Lvl ${t.l}</span></div>`).join("")}
        <div class="imbue"><h4><span>Imbued Traits</span><span>${D.weapon.wrightstone.name}</span></h4>
          ${D.weapon.wrightstone.rows.map(r=>`<div class="trow">${ic('sm')}
            <span class="sel">${r.t}</span><span class="lvl">T.Lvl ${r.l}</span></div>`).join("")}
        </div>
      </div>
      <div><h3>Sigils</h3><div class="sigilGrid">
        ${D.sigils.map(s=>`<div class="sigil">
          <div class="cell sel">${ic()}<span>${s.p}</span></div>
          <div class="cell sec sel">${ic('sm')}<span>${s.s}</span></div>
          <div class="lvl sel">${s.l}</div></div>`).join("")}
      </div></div>
    </div>
    <div class="c3">
      <h3>Master Traits</h3>
      <div class="mtGrid">
      ${Object.entries(MT).map(([style,S])=>`
        <div class="styleCol" style="--sc:var(${S.v})">
          <h4>${style}</h4>
          ${Object.entries(S.ranks).map(([rank,opts])=>`
            <div class="rank"><span>${rank}</span><span>${PTS[rank]} pts</span></div>
            <div class="opts">
              ${opts.map((o,i)=>`<div class="opt ${S.sel[rank].includes(i)?'on':''}">${ic('sm')}${o}</div>`).join("")}
            </div>`).join("")}
        </div>`).join("")}
      </div>
      <div class="mtFoot">${D.perks}</div>
      <h3>Summons</h3>
      <div class="summonGrid">
        ${D.summons.map(s=>`<div class="summonCard">
          <div class="row">${ic('sm')}<b class="sel grow" style="padding:1px 18px 1px 5px">${s.n}</b></div>
          <div class="row"><span class="sel grow">${s.t}</span><span class="lvl sel">${s.l}</span></div>
          <div class="row dim" style="font-size:12.5px">
            <span class="sel grow">${s.ebT}</span><span class="lvl sel">${s.ebV}</span></div>
        </div>`).join("")}
      </div>
    </div>
    <div id="tally"><h3>Trait Totals <span class="dim" style="float:right;font-size:11px">sigils + wrightstone</span></h3>
      ${tallyRows()}</div>
    <div id="tallyTab">Σ TOTALS (T)</div>
    <div class="brand">gbfr-sharecard — editor</div>
  </div>`;
  document.getElementById("stage").innerHTML = card;
  document.getElementById("tallyTab").onclick = toggleTally;
  /* uniform-height master-trait cells: shrink labels that overflow */
  document.querySelectorAll(".opt").forEach(el=>{
    if(el.scrollHeight>el.clientHeight+1) el.classList.add("long");
  });
  fit();
}
/* ---- trait tally: the one v1 calculation (sigils + wrightstone) ---- */
function tallyRows(){
  const acc = {};
  const add = (t,l)=>{ if(t) acc[t]=(acc[t]||0)+l; };
  D.sigils.forEach(s=>{ add(s.p,s.l); add(s.s,s.l); });
  D.weapon.wrightstone.rows.forEach(r=>add(r.t,r.l));
  return Object.entries(acc).sort((a,b)=>b[1]-a[1]).map(([t,l])=>
    `<div class="tallyRow"><span class="icon sm"></span>${t}<span class="lvl">${l}</span></div>`).join("");
}
function toggleTally(){ document.getElementById("tally").classList.toggle("open"); }
addEventListener("keydown",e=>{ if(/INPUT|TEXTAREA/.test(document.activeElement.tagName))return;
  if(e.key==="t"||e.key==="T") toggleTally(); });
function fit(){ const s=Math.min(1,(window.innerWidth-20)/1920);
  const st=document.getElementById("stage");
  st.style.transform=`scale(${s})`; st.style.height=`${1080*s}px`; }
addEventListener("resize",fit);
render();
</script>
</body>
</html>
